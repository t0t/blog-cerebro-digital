{% extends "base.html" %}

{% block header %}
    <a href="{{ rel_root }}" class="back-link">&larr; Bitacora 01234</a>

{% block content %}

        {{ post.svg_hero | safe }}
        <h1 class="post-title">{{ post.title }}</h1>

        <div class="post-content">
            {{ post.content | safe }}
        </div>
    </article>
{% endblock %}
